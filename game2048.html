<!DOCTYPE html>
<html>
<head>
    <title>2048 Game</title>
    <style>
        body {
            background: #faf8ef;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            touch-action: none; /* IMPORTANT for touchscreen computers */
        }

        h1 {
            margin-bottom: 10px;
        }

        #scoreBox {
            font-size: 24px;
            font-weight: bold;
            background: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
        }

        #board {
            width: 400px;
            height: 400px;
            background: #bbada0;
            margin: auto;
            padding: 10px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
        }

        .tile {
            width: 90px;
            height: 90px;
            background: pink;
            border-radius: 5px;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #776e65;
            transition: transform 0.15s ease-in-out;
        }

        #popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #popupBox {
            background: white;
            padding: 30px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
        }

        #popup button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #8f7a66;
            color: white;
            cursor: pointer;
        }

        #backButton {
            margin-top: 20px;
            padding: 10px 20px;
            background: #8f7a66;
            color: white;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>2048 Game</h1>

    <div id="scoreBox">Score: 0</div>

    <div id="board"></div>

    <button id="backButton" onclick="window.location.href='monster.html'">
        Back to Monster Page
    </button>

    <div id="popup">
        <div id="popupBox">
            <div id="popupMessage"></div>
            <button onclick="restartGame()">Restart</button>
        </div>
    </div>

    <script>
        let board = [];
        const boardSize = 4;
        let score = 0;

        function createBoard() {
            const boardDiv = document.getElementById("board");
            boardDiv.innerHTML = "";

            for (let i = 0; i < boardSize; i++) {
                board[i] = [];
                for (let j = 0; j < boardSize; j++) {
                    board[i][j] = 0;

                    const tile = document.createElement("div");
                    tile.classList.add("tile");
                    tile.id = `tile-${i}-${j}`;
                    boardDiv.appendChild(tile);
                }
            }
        }

        function updateBoard() {
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    const tile = document.getElementById(`tile-${i}-${j}`);
                    tile.textContent = board[i][j] === 0 ? "" : board[i][j];

                    tile.style.transform = "scale(1.1)";
                    setTimeout(() => tile.style.transform = "scale(1)", 150);
                }
            }
        }

        function addRandomTile() {
            let emptyTiles = [];

            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (board[i][j] === 0) {
                        emptyTiles.push({ x: i, y: j });
                    }
                }
            }

            if (emptyTiles.length === 0) return;

            const randomTile = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
            board[randomTile.x][randomTile.y] = Math.random() < 0.9 ? 2 : 4;
        }

        function slide(row) {
            row = row.filter(val => val !== 0);
            while (row.length < boardSize) row.push(0);
            return row;
        }

        function combine(row) {
            for (let i = 0; i < boardSize - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;

                    if (row[i] === 2048) showPopup("You Win!");
                }
            }
            return row;
        }

        function moveLeft() {
            let moved = false;
            for (let i = 0; i < boardSize; i++) {
                let row = board[i];
                let original = row.slice();
                row = slide(row);
                row = combine(row);
                row = slide(row);
                board[i] = row;
                if (JSON.stringify(original) !== JSON.stringify(row)) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let i = 0; i < boardSize; i++) {
                let row = board[i].slice().reverse();
                let original = board[i].slice();
                row = slide(row);
                row = combine(row);
                row = slide(row);
                board[i] = row.reverse();
                if (JSON.stringify(original) !== JSON.stringify(board[i])) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let col = 0; col < boardSize; col++) {
                let column = [];
                for (let row = 0; row < boardSize; row++) {
                    column.push(board[row][col]);
                }

                let original = column.slice();
                column = slide(column);
                column = combine(column);
                column = slide(column);

                for (let row = 0; row < boardSize; row++) {
                    board[row][col] = column[row];
                }

                if (JSON.stringify(original) !== JSON.stringify(column)) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let col = 0; col < boardSize; col++) {
                let column = [];
                for (let row = 0; row < boardSize; row++) {
                    column.push(board[row][col]);
                }

                let original = column.slice();
                column = column.reverse();
                column = slide(column);
                column = combine(column);
                column = slide(column);
                column = column.reverse();

                for (let row = 0; row < boardSize; row++) {
                    board[row][col] = column[row];
                }

                if (JSON.stringify(original) !== JSON.stringify(column)) moved = true;
            }
            return moved;
        }

        function checkGameOver() {
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (board[i][j] === 0) return false;
                    if (i < boardSize - 1 && board[i][j] === board[i + 1][j]) return false;
                    if (j < boardSize - 1 && board[i][j] === board[i][j + 1]) return false;
                }
            }
            return true;
        }

        function showPopup(message) {
            document.getElementById("popupMessage").textContent = message;
            document.getElementById("popup").style.display = "flex";
        }

        function restartGame() {
            score = 0;
            document.getElementById("scoreBox").textContent = "Score: 0";
            document.getElementById("popup").style.display = "none";
            createBoard();
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        /* TOUCHSCREEN + TOUCHSCREEN COMPUTER SWIPE SUPPORT */
        let startX = 0, startY = 0, endX = 0, endY = 0;

        function startSwipe(x, y) {
            startX = x;
            startY = y;
        }

        function endSwipe(x, y) {
            endX = x;
            endY = y;
            handleSwipe();
        }

        /* Touch events (phones/tablets) */
        document.addEventListener("touchstart", e => {
            startSwipe(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        });

        document.addEventListener("touchend", e => {
            endSwipe(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        });

        /* Pointer events (touchscreen laptops) */
        document.addEventListener("pointerdown", e => {
            if (e.pointerType === "touch") {
                startSwipe(e.clientX, e.clientY);
            }
        });

        document.addEventListener("pointerup", e => {
            if (e.pointerType === "touch") {
                endSwipe(e.clientX, e.clientY);
            }
        });

        function handleSwipe() {
            let dx = endX - startX;
            let dy = endY - startY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) triggerMove("right");
                else if (dx < -30) triggerMove("left");
            } else {
                if (dy > 30) triggerMove("down");
                else if (dy < -30) triggerMove("up");
            }
        }

        function triggerMove(direction) {
            let moved = false;

            if (direction === "left") moved = moveLeft();
            if (direction === "right") moved = moveRight();
            if (direction === "up") moved = moveUp();
            if (direction === "down") moved = moveDown();

            if (moved) {
                addRandomTile();
                updateBoard();
                document.getElementById("scoreBox").textContent = "Score: " + score;

                if (checkGameOver()) showPopup("Game Over!");
            }
        }

        restartGame();
    </script>

</body>
</html>
